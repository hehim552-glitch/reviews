<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Review | Azero GFX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 
                        brand: { DEFAULT: '#0099ff', dark: '#007acc', light: '#33adff' },
                        darker: '#050505'
                    }
                } 
            } 
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; background-image: radial-gradient(circle at 0% 0%, rgba(0, 153, 255, 0.08) 0%, transparent 25%); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        select option { background-color: #0a0a0a; color: white; }
        
        /* Loading Animation */
        .loader-ring { width: 40px; height: 40px; border: 3px solid rgba(0, 153, 255, 0.1); border-radius: 50%; border-top-color: #0099ff; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-4 py-12">

    <div class="max-w-2xl w-full">
        <div class="text-center mb-10">
            <!-- Avatar Display -->
            <div class="flex justify-center mb-6">
                <div id="avatar-container" class="w-24 h-24 rounded-full border-2 border-brand/30 bg-white/5 flex items-center justify-center overflow-hidden relative shadow-xl shadow-brand/10">
                    <i data-lucide="user" id="user-icon" class="w-10 h-10 text-gray-700"></i>
                  <img id="avatar-img" referrerpolicy="no-referrer" class="hidden w-full h-full object-cover z-10" src="" alt="Avatar">
                    <div id="loading-spinner" class="hidden absolute inset-0 flex items-center justify-center bg-black/40 z-20">
                        <div class="loader-ring"></div>
                    </div>
                </div>
            </div>

            <h1 class="text-4xl font-extrabold tracking-tight">Leave a <span class="text-brand">Review</span></h1>
            <p class="text-gray-500">Your feedback helps us push the boundaries of GFX.</p>
        </div>

        <form id="review-form" data-url="https://eofmrj2gswaolpg.m.pipedream.net" class="glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl relative">
            <div class="space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase text-gray-400">Roblox Username</label>
                        <input type="text" id="username" placeholder="e.g. TrulyAzero" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-brand" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase text-gray-400">Project Type</label>
                        <div class="relative">
                            <select id="type" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-brand appearance-none cursor-pointer">
                                <option value="Realistic Style">Realistic Style</option>
                                <option value="High CCU Style">High CCU Style</option>
                            </select>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-500">
                                <i data-lucide="chevron-down" class="w-4 h-4"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase text-gray-400">Roblox Profile Link</label>
                    <input type="url" id="profile_link" placeholder="https://www.roblox.com/users/45602663/profile" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-brand" required>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase text-gray-400">Discord Tag</label>
                        <input type="text" id="discord" placeholder="user#0000" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-5 outline-none focus:border-brand" required>
                    </div>
                    <div class="space-y-3">
                        <label class="text-xs font-bold uppercase text-gray-400">Star Rating</label>
                        <div id="star-container" class="flex gap-2">
                            <button type="button" onclick="setRating(1)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(2)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(3)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(4)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(5)" class="star-btn"><i data-lucide="star"></i></button>
                        </div>
                        <input type="hidden" id="stars-value" value="0">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase text-gray-400">Your Experience</label>
                    <textarea id="message" rows="4" placeholder="How was the GFX?" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-5 outline-none resize-none focus:border-brand" required></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-brand py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-brand-light transition-all shadow-lg shadow-brand/20">
                    Submit Review
                </button>
            </div>
        </form>

        <div id="success-msg" class="hidden text-center mt-10 p-10 glass rounded-[2.5rem]">
            <h2 class="text-3xl font-bold text-brand">Review Sent!</h2>
            <p class="text-gray-400 mt-2">Thank you! Your feedback will be uploaded on the main website shortly.</p>
        </div>
    </div>

    <script>
        let currentAvatarUrl = '';
   lucide.createIcons();

// --- STAR RATING ---
function setRating(n) {
    document.getElementById('stars-value').value = n;
    document.querySelectorAll('.star-btn').forEach((btn, index) => {
        const icon = btn.querySelector('svg');
        if (index < n) {
            icon.setAttribute('fill', '#ffb800');
            icon.setAttribute('stroke', '#ffb800');
        } else {
            icon.setAttribute('fill', 'none');
            icon.setAttribute('stroke', '#333');
        }
    });
}

// --- ROBLOX PFP ENGINE ---
const usernameField = document.getElementById('username');
const profileLinkField = document.getElementById('profile_link');
const avatarImg = document.getElementById('avatar-img');
const userIcon = document.getElementById('user-icon');
const spinner = document.getElementById('loading-spinner');



async function displayAvatar(userId) {
    if (!userId) return;
    spinner.classList.remove('hidden');

    try {
        const res = await fetch(`/api/roblox?userId=${userId}`);
        const data = await res.json();

        if (data.imageUrl) {
            avatarImg.src = data.imageUrl;
            currentAvatarUrl = data.imageUrl;
            avatarImg.onload = () => {
                avatarImg.classList.remove('hidden');
                userIcon.classList.add('hidden');
                spinner.classList.add('hidden');
            };
            avatarImg.onerror = () => {
                spinner.classList.add('hidden');
                userIcon.classList.remove('hidden');
            };
        } else {
            spinner.classList.add('hidden');
        }
    } catch (err) {
        console.error("Avatar error:", err);
        spinner.classList.add('hidden');
    }
}

async function getUserIdFromUsername(username) {
    spinner.classList.remove('hidden');

    try {
        const res = await fetch(`/api/roblox?username=${encodeURIComponent(username.trim())}`);
        const data = await res.json();

        if (data.userId) {
            profileLinkField.value = `https://www.roblox.com/users/${data.userId}/profile`;
            displayAvatar(data.userId);
        } else {
            spinner.classList.add('hidden');
        }
    } catch (err) {
        console.error("Username lookup error:", err);
        spinner.classList.add('hidden');
    }
}


// LISTENERS
usernameField.addEventListener('blur', () => {
    if (usernameField.value.trim()) {
        getUserIdFromUsername(usernameField.value);
    }
});

profileLinkField.addEventListener('input', () => {
    const val = profileLinkField.value;
    const match = val.match(/users\/(\d+)/);
    if (match && match[1]) {
        displayAvatar(match[1]);
    }
});

// FORM SUBMIT
document.getElementById('review-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (document.getElementById('stars-value').value === "0") return alert("Please select stars!");

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerText = "Sending Review...";

    const payload = {
        username: usernameField.value,
        project_type: document.getElementById('type').value,
        profile_link: profileLinkField.value,
        avatar_url: currentAvatarUrl,
date: new Date().toLocaleDateString('en-US'),
        discord: document.getElementById('discord').value,
        stars: document.getElementById('stars-value').value,
        message: document.getElementById('message').value,
        submitted_at: new Date().toISOString()
    };

    try {
        await fetch(e.target.dataset.url, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        e.target.classList.add('hidden');
        document.getElementById('success-msg').classList.remove('hidden');
    } catch (err) {
        e.target.classList.add('hidden');
        document.getElementById('success-msg').classList.remove('hidden');
    }
});
</script>
</body>
</html>
