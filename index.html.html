<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Review | Azero GFX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { extend: { colors: { brand: { DEFAULT: '#0099ff', dark: '#007acc', light: '#33adff' }, darker: '#050505' } } } 
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .star-btn svg { width: 24px; height: 24px; transition: all 0.2s; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-4 py-12">

    <div class="max-w-2xl w-full">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight">Leave a <span class="text-brand">Review</span></h1>
            <p class="text-gray-500">Your feedback helps us push the boundaries of GFX.</p>
        </div>

        <!-- Update form to allow file uploads (enctype) -->
        <form id="review-form" action="https://formspree.io/f/mjgzzwwz" method="POST" enctype="multipart/form-data" class="glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl relative">
            <div class="space-y-8">
                
                <!-- Avatar Preview & Manual Upload -->
                <div class="flex items-center gap-6 p-5 rounded-3xl bg-white/[0.02] border border-white/5">
                    <div class="relative group">
                        <img id="avatar-preview" src="https://i.imgur.com/3Z6nZfR.png" class="w-20 h-20 rounded-2xl bg-darker border border-white/10 object-cover">
                        <!-- Manual Upload Overlay -->
                        <label class="absolute inset-0 flex items-center justify-center bg-black/60 rounded-2xl opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity">
                            <i data-lucide="camera" class="w-6 h-6 text-white"></i>
                            <input type="file" name="manual_avatar" accept="image/*" class="hidden" onchange="handleManualUpload(this)">
                        </label>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-brand uppercase tracking-widest mb-1">Visual Identity</p>
                        <h3 id="preview-status" class="text-lg font-bold text-gray-300">Awaiting Info...</h3>
                        <p class="text-[10px] text-gray-500 italic">Auto-fetches from ID, or click image to upload manually</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase text-gray-400">Roblox Username</label>
                        <input type="text" name="username" placeholder="e.g. TrulyAzero" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-brand" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase text-gray-400">Project Type</label>
                        <select name="type" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-4 outline-none">
                            <option>Realistic Style</option>
                            <option>High CTR Style</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase text-gray-400">Profile Link (Paste for instant photo)</label>
                    <input type="url" name="profile_link" id="roblox-link" oninput="extractIdFromLink(this.value)" placeholder="https://www.roblox.com/users/4091549721/profile" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-brand">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                    <div class="space-y-3">
                        <label class="text-xs font-bold uppercase text-gray-400">Star Rating</label>
                        <div id="star-container" class="flex gap-2">
                            <button type="button" onclick="setRating(1)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(2)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(3)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(4)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(5)" class="star-btn"><i data-lucide="star"></i></button>
                        </div>
                        <input type="hidden" name="stars" id="stars-value" value="0">
                    </div>
                    <input type="text" name="discord" placeholder="Discord Tag" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-5 outline-none">
                </div>

                <textarea name="message" rows="4" placeholder="Your Experience..." class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-5 outline-none resize-none" required></textarea>

                <button type="submit" id="submit-btn" class="w-full bg-brand py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-brand-light transition-all shadow-lg shadow-brand/20">
                    Submit Review
                </button>
            </div>
        </form>

        <div id="success-msg" class="hidden text-center mt-10 p-10 glass rounded-[2.5rem]">
            <h2 class="text-3xl font-bold">Review Sent!</h2>
            <p class="text-gray-400 mt-2">Check your email moderation dashboard.</p>
        </div>
    </div>

<script>
    lucide.createIcons();

    // 1. IMPROVED AUTO-FETCH (Using Weserv Proxy - much stronger)
    function updatePfp(userId) {
        if (!userId) return;
        const previewImg = document.getElementById('avatar-preview');
        const status = document.getElementById('preview-status');
        
        // This proxy service usually bypasses Roblox's restrictions
        const robloxUrl = `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=150&height=150&format=png`;
        const finalUrl = `https://images.weserv.nl/?url=${encodeURIComponent(robloxUrl)}&noprocess`;

        previewImg.src = finalUrl;
        status.innerText = "Identity Verified";
        status.className = "text-lg font-bold text-brand";
    }

    // 2. MANUAL UPLOAD HANDLER (The "Other Way")
    function handleManualUpload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('avatar-preview').src = e.target.result;
                const status = document.getElementById('preview-status');
                status.innerText = "Manual Photo Added";
                status.className = "text-lg font-bold text-brand";
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function extractIdFromLink(url) {
        const match = url.match(/users\/(\d+)/);
        if (match && match[1]) updatePfp(match[1]);
    }

    function setRating(n) {
        document.getElementById('stars-value').value = n;
        const starButtons = document.querySelectorAll('.star-btn');
        starButtons.forEach((btn, index) => {
            const icon = btn.querySelector('svg');
            if (icon) {
                if (index < n) {
                    icon.style.fill = "#ffb800";
                    icon.style.stroke = "#ffb800";
                } else {
                    icon.style.fill = "transparent";
                    icon.style.stroke = "#333";
                }
            }
        });
    }

    // --- SUBMISSION FIX ---
    const form = document.getElementById('review-form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const stars = document.getElementById('stars-value').value;

        if (stars === "0") { alert("Please select a star rating!"); return; }

        btn.innerText = "SENDING...";
        btn.disabled = true;

        try {
            const response = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                form.classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } else {
                const result = await response.json();
                console.error("Formspree error:", result);
                alert("Submission failed: " + (result.errors ? result.errors[0].message : "Check your Formspree ID"));
                btn.innerText = "Submit Review";
                btn.disabled = false;
            }
        } catch (error) {
            console.error("Network error:", error);
            alert("A network error occurred. Ensure your Formspree form is 'Active' in their dashboard.");
            btn.innerText = "Submit Review";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
