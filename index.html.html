<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Review | Azero GFX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 
                        brand: { DEFAULT: '#0099ff', dark: '#007acc', light: '#33adff' },
                        darker: '#050505'
                    }
                } 
            } 
        }
    </script>
    <style>
        /* Fixes the "White Box" issue in the dropdown list */
    select option {
        background-color: #0a0a0a;
        color: white;
    }
    /* Removes the default arrow in IE/Edge */
    select::-ms-expand {
        display: none;
    }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; background-image: radial-gradient(circle at 0% 0%, rgba(0, 153, 255, 0.08) 0%, transparent 25%); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .star-inactive { color: #333 !important; fill: transparent !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-4 py-12">

    <div class="max-w-2xl w-full">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight">Leave a <span class="text-brand">Review</span></h1>
            <p class="text-gray-500">Your feedback helps us push the boundaries of GFX.</p>
        </div>

        <form id="review-form" action="https://formspree.io/f/mqakpneq" method="POST" class="glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl relative">
            <div class="space-y-8">
                
                <!-- 1 & 2: Username and Project Type -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase text-gray-400">Roblox Username</label>
                        <input type="text" name="username" id="username" placeholder="e.g. TrulyAzero" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-brand" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase text-gray-400">Project Type</label>
                        <select name="type" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-4 outline-none">
                            <option>Realism</option>
                            <option>High CTR</option>
                        </select>
                    </div>
                </div>

                <!-- 3: Roblox Profile Link -->
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase text-gray-400">Roblox Profile Link</label>
                    <input type="url" name="profile_link" id="roblox-link" placeholder="https://www.roblox.com/users/4091549721/profile" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-brand" required>
                </div>

                <!-- 4 & 5: Discord and Star Rating -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase text-gray-400">Discord Tag</label>
                        <input type="text" name="discord" placeholder="user#0000" class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-5 outline-none focus:border-brand">
                    </div>
                    <div class="space-y-3">
                        <label class="text-xs font-bold uppercase text-gray-400">Star Rating</label>
                        <div id="star-container" class="flex gap-2">
                            <button type="button" onclick="setRating(1)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(2)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(3)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(4)" class="star-btn"><i data-lucide="star"></i></button>
                            <button type="button" onclick="setRating(5)" class="star-btn"><i data-lucide="star"></i></button>
                        </div>
                        <input type="hidden" name="stars" id="stars-value" value="">
                    </div>
                </div>

                <!-- 6: Experience -->
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase text-gray-400">Your Experience</label>
                    <textarea name="message" rows="4" placeholder="Describe your experience working with us..." class="w-full bg-white/[0.03] border border-white/10 rounded-2xl py-4 px-5 outline-none resize-none focus:border-brand" required></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-brand py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-brand-light transition-all shadow-lg shadow-brand/20">
                    Submit Review
                </button>
            </div>
        </form>

        <div id="success-msg" class="hidden text-center mt-10 p-10 glass rounded-[2.5rem]">
            <h2 class="text-3xl font-bold text-brand">Review Sent!</h2>
            <p class="text-gray-400 mt-2">Thank you for your feedback. We appreciate your support!</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function setRating(n) {
            document.getElementById('stars-value').value = n;
            const starButtons = document.querySelectorAll('.star-btn');
            starButtons.forEach((btn, index) => {
                const icon = btn.querySelector('svg');
                if (icon) {
                    if (index < n) {
                        icon.setAttribute('fill', '#ffb800');
                        icon.setAttribute('stroke', '#ffb800');
                        icon.style.color = '#ffb800';
                    } else {
                        icon.setAttribute('fill', 'none');
                        icon.setAttribute('stroke', '#333');
                        icon.style.color = '#333';
                    }
                }
            });
        }
        
        // Default stars to 0 on load
        setTimeout(() => setRating(0), 100);

        const form = document.getElementById('review-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const starsValue = document.getElementById('stars-value').value;
            if (!starsValue || starsValue === "0") {
                alert("Please select a star rating before submitting!");
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.innerText = "Sending...";
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    form.classList.add('hidden');
                    document.getElementById('success-msg').classList.remove('hidden');
                } else {
                    alert("Submission failed.");
                    btn.innerText = "Submit Review";
                }
            } catch (error) {
                alert("An error occurred. Please try again.");
                btn.innerText = "Submit Review";
            }
        });
    </script>
</body>
</html>
